<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cord</title>
<script src="/socket.io/socket.io.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;}
:root{
  --bg-deep:#111214;
  --bg-dark:#1e1f22;
  --bg-mid:#232428;
  --bg-base:#2b2d31;
  --bg-raised:#313338;
  --bg-float:#383a40;
  --bg-hover:rgba(255,255,255,.06);
  --bg-active:rgba(255,255,255,.12);
  --bg-selected:rgba(255,255,255,.08);
  --text-normal:#dbdee1;
  --text-muted:#80848e;
  --text-link:#00a8fc;
  --text-positive:#23a55a;
  --text-warning:#f0b232;
  --text-danger:#f23f43;
  --header-primary:#f2f3f5;
  --header-secondary:#b5bac1;
  --interactive-normal:#b5bac1;
  --interactive-hover:#dbdee1;
  --interactive-active:#f2f3f5;
  --brand:#5865f2;
  --brand-hover:#4752c4;
  --brand-active:#3c45a5;
  --green:#23a55a;
  --red:#f23f43;
  --yellow:#f0b232;
  --divider:rgba(255,255,255,.06);
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r50:50%;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg-deep);color:var(--text-normal);font-size:15px;line-height:1.375;}
button{cursor:pointer;font-family:inherit;}
input,textarea{font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg-float);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#666;}

/* ══════════════ AUTH ══════════════ */
#auth-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg-deep);
  display:flex;align-items:center;justify-content:center;
  opacity:1;transition:opacity .4s ease;
}
#auth-screen.fade-out{opacity:0;pointer-events:none;}
.auth-glow{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 30% 40%,rgba(88,101,242,.12) 0%,transparent 70%),
    radial-gradient(ellipse 500px 400px at 75% 70%,rgba(235,69,158,.08) 0%,transparent 60%);
}
.auth-card{
  position:relative;z-index:1;
  background:var(--bg-mid);border-radius:var(--r16);
  padding:32px 40px 40px;width:480px;max-width:96vw;
  box-shadow:0 8px 16px rgba(0,0,0,.24),0 32px 80px rgba(0,0,0,.56);
  border:1px solid var(--divider);
  animation:authIn .35s cubic-bezier(.4,0,.2,1) both;
}
@keyframes authIn{from{opacity:0;transform:scale(.96) translateY(12px);}to{opacity:1;transform:none;}}
.auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;}
.auth-logo-icon{
  width:44px;height:44px;border-radius:var(--r12);
  background:var(--brand);display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;
  box-shadow:0 4px 16px rgba(88,101,242,.4);
}
.auth-logo-text{font-size:24px;font-weight:800;color:var(--header-primary);letter-spacing:-.4px;}
.auth-heading{font-size:20px;font-weight:700;color:var(--header-primary);text-align:center;margin-bottom:6px;}
.auth-subheading{font-size:13.5px;color:var(--text-muted);text-align:center;margin-bottom:24px;}
.auth-tabs{
  display:grid;grid-template-columns:1fr 1fr;gap:3px;
  background:var(--bg-deep);border-radius:var(--r8);padding:3px;margin-bottom:20px;
}
.auth-tab{
  padding:9px;border-radius:6px;border:none;
  background:transparent;color:var(--text-muted);
  font-size:13px;font-weight:700;transition:all .15s ease;
}
.auth-tab:hover{color:var(--interactive-hover);}
.auth-tab.active{background:var(--bg-float);color:var(--header-primary);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:16px;}
.form-group.full{grid-column:1/-1;}
.form-label{
  display:block;font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.06em;
  color:var(--header-secondary);margin-bottom:7px;
}
.form-label .req{color:var(--red);}
.form-input{
  width:100%;padding:10px 12px;
  background:var(--bg-deep);border:1.5px solid rgba(255,255,255,.08);
  border-radius:var(--r8);color:var(--header-primary);font-size:14.5px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.form-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(88,101,242,.2);}
.form-input::placeholder{color:var(--text-muted);opacity:.7;}
.form-input.error{border-color:var(--red);}
.form-hint{font-size:12px;color:var(--text-muted);margin-top:5px;}
.form-hint.err{color:var(--red);}
.auth-btn{
  width:100%;padding:13px;border-radius:var(--r8);
  background:var(--brand);border:none;color:#fff;
  font-size:15px;font-weight:700;
  transition:background .15s,transform .1s,box-shadow .15s;margin-top:8px;
  box-shadow:0 2px 8px rgba(88,101,242,.3);
}
.auth-btn:hover{background:var(--brand-hover);transform:translateY(-1px);box-shadow:0 4px 16px rgba(88,101,242,.45);}
.auth-btn:active{transform:none;background:var(--brand-active);}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.global-err{
  background:rgba(243,63,67,.12);border:1px solid rgba(243,63,67,.3);
  border-radius:var(--r8);padding:10px 14px;
  color:var(--red);font-size:13px;font-weight:600;
  margin-bottom:14px;display:none;
}
.global-err.show{display:block;}
.verify-icon{font-size:48px;text-align:center;margin-bottom:12px;}
.verify-desc{font-size:14px;color:var(--text-muted);text-align:center;margin-bottom:20px;line-height:1.5;}
.otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:20px;}
.otp-box{
  width:52px;height:56px;border-radius:var(--r8);
  background:var(--bg-deep);border:1.5px solid rgba(255,255,255,.08);
  color:var(--header-primary);font-size:22px;font-weight:700;
  text-align:center;outline:none;transition:border-color .2s;
}
.otp-box:focus{border-color:var(--brand);}
.resend-link{text-align:center;font-size:13px;color:var(--text-muted);}
.resend-link a{color:var(--brand);cursor:pointer;text-decoration:none;}
.resend-link a:hover{text-decoration:underline;}

/* ══════════════ APP LAYOUT ══════════════ */
#app{display:none;height:100vh;flex-direction:row;}
#app.visible{display:flex;}

/* ── Server Rail ── */
#server-rail{
  width:72px;min-width:72px;background:var(--bg-deep);
  display:flex;flex-direction:column;align-items:center;
  padding:12px 0;gap:2px;overflow-y:auto;overflow-x:hidden;
}
.rail-sep{width:32px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;margin:4px 0;flex-shrink:0;}
.server-btn{
  position:relative;width:48px;height:48px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;color:#fff;font-weight:800;font-size:16px;
  transition:border-radius .2s cubic-bezier(.4,0,.2,1),filter .15s;
  flex-shrink:0;overflow:hidden;background:var(--bg-base);user-select:none;
}
.server-btn::before{
  content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:4px;border-radius:0 4px 4px 0;background:var(--header-primary);
  height:0;transition:height .2s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.server-btn:hover{border-radius:var(--r16);}
.server-btn:hover::before{height:20px;}
.server-btn.active{border-radius:var(--r16);}
.server-btn.active::before{height:44px;}
.server-btn .srv-tooltip{
  position:absolute;left:calc(100% + 16px);top:50%;transform:translateY(-50%);
  background:var(--bg-deep);color:var(--header-primary);
  font-size:14px;font-weight:700;padding:8px 12px;border-radius:var(--r8);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .15s,transform .15s;transform:translateY(-50%) translateX(-4px);
  box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:200;border:1px solid var(--divider);
}
.server-btn:hover .srv-tooltip{opacity:1;transform:translateY(-50%) translateX(0);}
.srv-dm-btn{background:var(--brand);}
.srv-add-btn{background:var(--bg-base);color:var(--green);font-size:24px;}
.srv-add-btn:hover{background:var(--green);color:#fff;border-radius:var(--r16);}

/* ── Channel Panel ── */
#channel-panel{
  width:240px;min-width:240px;background:var(--bg-mid);
  display:flex;flex-direction:column;
}
#panel-header{
  height:48px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(0,0,0,.2);flex-shrink:0;
  cursor:pointer;transition:background .15s;
  box-shadow:0 1px 0 rgba(0,0,0,.2);
}
#panel-header:hover{background:var(--bg-hover);}
#panel-header-name{font-size:15px;font-weight:800;color:var(--header-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.panel-icon-btn{
  width:28px;height:28px;border-radius:var(--r4);border:none;
  background:transparent;color:var(--interactive-normal);
  font-size:20px;display:flex;align-items:center;justify-content:center;
  transition:color .15s,background .15s;flex-shrink:0;
}
.panel-icon-btn:hover{background:var(--bg-hover);color:var(--interactive-active);}
#channel-list{flex:1;overflow-y:auto;padding:8px 0;}
.ch-category{
  padding:14px 8px 4px 16px;
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.065em;
  color:var(--interactive-normal);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;transition:color .15s;
}
.ch-category:hover{color:var(--interactive-active);}
.ch-category .cat-add{opacity:0;font-size:18px;transition:opacity .15s;}
.ch-category:hover .cat-add{opacity:1;}
.ch-item{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px 5px 12px;border-radius:var(--r4);
  margin:1px 8px;cursor:pointer;
  color:var(--interactive-normal);font-size:15px;font-weight:500;
  transition:background .1s,color .1s;user-select:none;position:relative;
}
.ch-item:hover{background:var(--bg-hover);color:var(--interactive-hover);}
